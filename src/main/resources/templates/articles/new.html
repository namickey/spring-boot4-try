<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('新規投稿')}"></head>
<body>
    <header th:replace="~{fragments/common :: nav}"></header>
    <main class="container col-lg-8 mt-4 mb-5">
        <h1 class="h3 mb-4">記事投稿</h1>
        <form th:action="@{/articles/new}" th:object="${article}" method="post">
            <div class="mb-3">
                <label class="form-label" for="title">タイトル</label>
                <input type="text" class="form-control" id="title" th:field="*{title}" required>
            </div>

            <div class="mb-3">
                <label class="form-label" for="content">本文</label>
                <textarea class="form-control" id="content" th:field="*{content}" rows="8" required></textarea>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">投稿する</button>
                <a class="btn btn-secondary" th:href="@{/}">キャンセル</a>
            </div>
        </form>
    </main>
</body>
</html>
