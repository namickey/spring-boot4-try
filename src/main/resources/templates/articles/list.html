<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('記事一覧')}"></head>
<body>
    <header th:replace="~{fragments/common :: nav}"></header>
    <main class="container mt-4 mb-5">
        <div class="text-end mb-3">
            <a class="btn btn-primary" th:href="@{/articles/new}">新規投稿</a>
        </div>

        <div th:if="${#lists.isEmpty(articles)}" class="text-center text-muted py-5">
            記事がまだありません。
        </div>

        <div class="card mb-3" th:each="article : ${articles}">
            <div class="card-body">
                <h2 class="card-title h5"><a class="text-decoration-none" th:href="@{'/articles/' + ${article.id}}" th:text="${article.title}">タイトル</a></h2>
                <div class="text-muted small" th:text="${#temporals.format(article.createdAt, 'yyyy-MM-dd HH:mm')}">2026-01-01</div>
            </div>
        </div>
    </main>
</body>
</html>
